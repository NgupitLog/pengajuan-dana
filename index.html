<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Pengajuan Estimasi Dana</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f4f6f8;
  padding:15px;
}
h2{color:#0b4ea2}

/* CARD */
.header,.so-block{
  background:#fff;
  padding:15px;
  border-radius:8px;
  margin-bottom:15px;
  border-left:5px solid #ff8c00;
}

/* GRID FLEX */
.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.col{
  flex:1 1 150px;
}

.col.big{flex:2 1 250px}

/* INPUT */
label{
  font-size:12px;
  font-weight:bold;
}

input,select{
  width:100%;
  padding:7px;
  margin-top:3px;
  margin-bottom:6px;
  font-size:13px;
  border-radius:4px;
  border:1px solid #ccc;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th{
  background:#0b4ea2;
  color:#fff;
  padding:6px;
  font-size:12px;
}

td{padding:6px}

/* BUTTON */
.btn{
  background:#ff8c00;
  color:#fff;
  border:none;
  padding:7px 12px;
  border-radius:5px;
  cursor:pointer;
}

.btn-blue{background:#0b4ea2}

/* ICON DELETE */
.btn-icon{
  background:#e74c3c;
  color:#fff;
  border:none;
  padding:4px 8px;
  border-radius:50%;
  cursor:pointer;
  font-size:12px;
}

/* TOTAL */
.total{
  margin-top:8px;
  font-weight:bold;
}

/* MOBILE FIX */
@media(max-width:768px){
  .row{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<h2>Form Pengajuan Estimasi Dana</h2>

<div class="header">
  <div class="row">

    <div class="col">
      <label>PIC</label>
      <select id="pic"><option value="">-- pilih --</option></select>
    </div>

    <div class="col">
      <label>Belongs To</label>
      <select id="belongsTo">
        <option value="">-- pilih --</option>
        <option>Ngupit</option>
        <option>Paksi</option>
      </select>
    </div>

    <div class="col big">
      <label>Company Name</label>
      <input id="companySearch" placeholder="Cari company...">
      <select id="companyName" size="4"></select>
    </div>

  </div>
</div>

<div id="soContainer"></div>

<button class="btn btn-blue" id="btnAddSO">+ Tambah SO</button>
<br><br>
<button class="btn" id="btnSubmit">SUBMIT</button>

<script>
document.addEventListener("DOMContentLoaded", () => {

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxdBjLnHDR_xFM_kcjXUg740s7R9y4zZOQVu6WV9sAFZ7CPJ9NdpjIVOzrxuZfZkcn8xQ/exec";

const pic = document.getElementById("pic");
const belongsTo = document.getElementById("belongsTo");
const companySearch = document.getElementById("companySearch");
const companySelect = document.getElementById("companyName");
const soContainer = document.getElementById("soContainer");

let companyList=[];

/* LOAD PIC */
fetch(SCRIPT_URL+"?type=pic")
.then(r=>r.json())
.then(d=>{
  d.forEach(v=>pic.innerHTML+=`<option>${v}</option>`);
});

/* LOAD COMPANY */
fetch(SCRIPT_URL+"?type=company")
.then(r=>r.json())
.then(d=>{
  companyList=d;
  renderCompany(d);
});

function renderCompany(list){
  companySelect.innerHTML="";
  list.forEach(v=>{
    companySelect.innerHTML+=`<option>${v}</option>`;
  });
}

companySearch.oninput=()=>{
  renderCompany(companyList.filter(c=>
    c.toLowerCase().includes(companySearch.value.toLowerCase())
  ));
};

companySelect.onchange=()=>{
  companySearch.value=companySelect.value;
};

/* ADD SO */
function addSO(){
  const so=document.createElement("div");
  so.className="so-block";

  so.innerHTML=`
    <button class="btn-icon">✕</button>
    <h3>Detail SO</h3>

    <div class="row">

      <div class="col big">
        <label>SO Number</label>
        <input class="soNumber">
      </div>

      <div class="col">
        <label>BL</label>
        <input class="bl">
      </div>

      <div class="col">
        <label>No AJU</label>
        <input class="aju">
      </div>

      <div class="col">
        <label>ETA</label>
        <input type="date" class="eta">
      </div>

      <div class="col">
        <label>FCL/LCL</label>
        <select class="shipment">
          <option>FCL</option>
          <option>LCL</option>
        </select>
      </div>

      <div class="col">
        <label>QTY</label>
        <input class="qty" placeholder="1x40 / 2x20 / 3,5 Ton">
      </div>

    </div>

    <table>
      <thead>
        <tr>
          <th>Jenis Biaya</th>
          <th>Nominal</th>
          <th></th>
        </tr>
      </thead>
      <tbody class="items"></tbody>
    </table>

    <button class="btn addBiaya">+ Tambah Biaya</button>
    <div class="total">Total: Rp <span>0</span></div>
  `;

  soContainer.appendChild(so);

  /* DELETE ICON */
  so.querySelector(".btn-icon").onclick=()=>so.remove();

  so.querySelector(".addBiaya").onclick=()=>addItem(so);

  addItem(so);
}

function addItem(so){
  const tr=document.createElement("tr");

  tr.innerHTML=`
    <td>
      <select class="jenis">
        <option>Biaya Import</option>
        <option>Biaya Export</option>
        <option>Non Shipment</option>
      </select>
    </td>
    <td><input type="number" class="nominal" value="0"></td>
    <td><button class="btn-icon">✕</button></td>
  `;

  so.querySelector(".items").appendChild(tr);

  tr.querySelector(".nominal").oninput=()=>calc(so);
  tr.querySelector(".btn-icon").onclick=()=>{
    tr.remove();
    calc(so);
  };
}

function calc(so){
  let t=0;
  so.querySelectorAll(".nominal").forEach(i=>{
    t+=Number(i.value||0);
  });
  so.querySelector(".total span").innerText=t.toLocaleString("id-ID");
}

document.getElementById("btnAddSO").onclick=addSO;
addSO();

});
</script>

</body>
</html>
