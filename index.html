<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Pengajuan Estimasi Dana</title>

<style>
body{
  font-family:Arial;
  background:#f4f6f8;
  padding:15px;
}

h2{color:#0b4ea2}

/* CARD */
.header,.so-block{
  background:#fff;
  padding:15px;
  border-radius:8px;
  margin-bottom:15px;
  border-left:5px solid #ff8c00;
  position:relative;
}

/* GRID */
.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.col{
  flex:1 1 140px;
}

.col.big{flex:2 1 250px}

/* INPUT */
label{
  font-size:12px;
  font-weight:bold;
}

input,select{
  width:100%;
  padding:7px;
  border:1px solid #ccc;
  border-radius:4px;
  font-size:13px;
}

/* DELETE SO */
.delete-so{
  position:absolute;
  left:10px;
  top:10px;
  background:#e74c3c;
  color:#fff;
  border:none;
  border-radius:50%;
  width:28px;
  height:28px;
  cursor:pointer;
}

/* TABLE */
table{
  width:100%;
  margin-top:10px;
  border-collapse:collapse;
}

th{
  background:#1f5aa6;
  color:#fff;
  padding:6px;
  font-size:12px;
}

td{padding:6px}

/* BUTTON */
.btn{
  background:#ff8c00;
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:5px;
  cursor:pointer;
}

.btn-blue{background:#0b4ea2}

.btn-icon{
  background:#e74c3c;
  color:#fff;
  border:none;
  border-radius:50%;
  width:24px;
  height:24px;
  cursor:pointer;
}

/* TOTAL */
.total{
  margin-top:10px;
  font-weight:bold;
}

/* MOBILE */
@media(max-width:768px){
  .row{flex-direction:column}
}
</style>
</head>

<body>

<h2>Form Pengajuan Estimasi Dana</h2>

<div class="header">
  <div class="row">

    <div class="col">
      <label>PIC</label>
      <select id="pic"></select>
    </div>

    <div class="col">
      <label>Belongs To</label>
      <select id="belongsTo">
        <option>Ngupit</option>
        <option>Paksi</option>
      </select>
    </div>

    <div class="col big">
      <label>Company Name</label>
      <input id="companySearch" placeholder="Cari company...">
    </div>

  </div>
</div>

<div id="soContainer"></div>

<button class="btn btn-blue" id="btnAddSO">+ Tambah SO</button>
<br><br>
<button class="btn" id="btnSubmit">SUBMIT</button>

<script>
document.addEventListener("DOMContentLoaded",()=>{

const SCRIPT_URL="YOUR_SCRIPT_URL";

const pic=document.getElementById("pic");

/* LOAD PIC */
fetch(SCRIPT_URL+"?type=pic")
.then(r=>r.json())
.then(d=>{
  d.forEach(v=>pic.innerHTML+=`<option>${v}</option>`);
});

/* ADD SO */
function addSO(){
  const so=document.createElement("div");
  so.className="so-block";

  so.innerHTML=`
    <button class="delete-so">✕</button>

    <h3>Detail SO</h3>

    <div class="row">

      <div class="col big">
        <label>SO Number</label>
        <input class="soNumber">
      </div>

      <div class="col">
        <label>BL</label>
        <input class="bl">
      </div>

      <div class="col">
        <label>No AJU</label>
        <input class="aju" minlength="6">
      </div>

      <div class="col">
        <label>ETA</label>
        <input type="date" class="eta">
      </div>

      <div class="col">
        <label>FCL/LCL</label>
        <select class="ship">
          <option>FCL</option>
          <option>LCL</option>
        </select>
      </div>

      <div class="col">
        <label>QTY</label>
        <input placeholder="1x40 / 2x20 / 3,5 Ton">
      </div>

    </div>

    <table>
      <thead>
        <tr>
          <th>Jenis Biaya</th>
          <th>Nominal</th>
          <th></th>
        </tr>
      </thead>
      <tbody class="items"></tbody>
    </table>

    <div style="display:flex; gap:10px; align-items:center;">
      <button class="btn addBiaya">+ Tambah Biaya</button>
      <span style="color:#e74c3c; cursor:pointer;" class="hapusAll">Hapus Biaya</span>
    </div>

    <div class="total">Total: Rp <span>0</span></div>
  `;

  document.getElementById("soContainer").appendChild(so);

  /* DELETE SO */
  so.querySelector(".delete-so").onclick=()=>so.remove();

  /* ADD ITEM */
  so.querySelector(".addBiaya").onclick=()=>addItem(so);

  /* HAPUS SEMUA */
  so.querySelector(".hapusAll").onclick=()=>{
    so.querySelector(".items").innerHTML="";
    calc(so);
  };

  addItem(so);
}

function addItem(so){
  const tr=document.createElement("tr");

  tr.innerHTML=`
    <td>
      <select>
        <option>Biaya Import</option>
        <option>Biaya Export</option>
        <option>Non Shipment</option>
      </select>
    </td>
    <td><input type="number" class="nominal" value="0"></td>
    <td><button class="btn-icon">✕</button></td>
  `;

  so.querySelector(".items").appendChild(tr);

  tr.querySelector(".nominal").oninput=()=>calc(so);

  tr.querySelector(".btn-icon").onclick=()=>{
    tr.remove();
    calc(so);
  };
}

function calc(so){
  let total=0;
  so.querySelectorAll(".nominal").forEach(i=>{
    total+=Number(i.value||0);
  });
  so.querySelector(".total span").innerText=total.toLocaleString("id-ID");
}

document.getElementById("btnAddSO").onclick=addSO;
addSO();

});
</script>

</body>
</html>
